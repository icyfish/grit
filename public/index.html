<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Sora", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 2rem 1rem 0.5rem;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    header p {
      color: #888;
      margin-top: 0.5rem;
    }
    .stats {
      text-align: center;
      color: #666;
      font-size: 0.85rem;
      padding: 0.5rem 0;
    }
    .stats span { color: #e84393; font-weight: 600; }

    /* Toolbar: filters + sort */
    .toolbar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .filter-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .filter-row .label {
      font-size: 0.75rem;
      color: #666;
      min-width: 2.5em;
      text-align: right;
    }
    .filter-row button {
      background: #222;
      color: #ccc;
      border: 1px solid #333;
      padding: 0.35rem 0.85rem;
      border-radius: 2rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .filter-row button:hover { border-color: #555; color: #fff; }
    .filter-row button.active {
      background: #e84393;
      color: #fff;
      border-color: #e84393;
    }
    .filter-row button.who-btn.active {
      background: transparent;
      border-color: #e84393;
      color: #e84393;
    }

    .sort-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: space-between;
    }
    .sort-row .left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .sort-btn {
      background: #222;
      color: #ccc;
      border: 1px solid #333;
      padding: 0.35rem 0.85rem;
      border-radius: 2rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .sort-btn:hover { border-color: #555; color: #fff; }
    .sort-btn .arrow { font-size: 0.7rem; }

    /* Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
      padding: 1rem 2rem 3rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-4px); }
    .card .img-wrap {
      cursor: pointer;
      aspect-ratio: 16/9;
      overflow: hidden;
    }
    .card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
    .card .info {
      padding: 0.6rem 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .card .info .date {
      font-size: 0.78rem;
      color: #888;
    }
    .card .info .title {
      font-size: 0.88rem;
      font-weight: 600;
    }
    .card .info .tags {
      display: flex;
      gap: 0.3rem;
      align-items: center;
      margin-left: auto;
    }
    .tag {
      display: inline-block;
      font-size: 0.65rem;
      background: #e84393;
      color: #fff;
      padding: 0.12rem 0.5rem;
      border-radius: 1rem;
      font-weight: 500;
    }
    .tag.athletic { background: #0984e3; }
    .tag.strength { background: #fdcb6e; color: #333; }
    .tag.camp { background: #6c5ce7; }
    .tag.mix { background: #e17055; }
    .who-tag {
      font-size: 0.95rem;
      line-height: 1;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 8px;
    }

    /* Empty state */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: #555;
      font-size: 1rem;
    }

    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: 1fr;
        padding: 0.5rem;
        gap: 0.75rem;
      }
      .toolbar { padding: 0.5rem 0.75rem; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>

      {file:"2026-03-24-grit-athletic-39.JPG",date:"2026-03-24",category:"athletic",label:"Athletic 39",who:["star"]},
      {file:"2026-03-24-grit-cardio-55.JPG",date:"2026-03-24",category:"cardio",label:"Cardio 55",who:["star"]},
      {file:"2026-03-28-grit-cardio-54.JPG",date:"2026-03-28",category:"cardio",label:"Cardio 54",who:["fish"]},
      {file:"2026-03-29-grit-cardio-30.JPG",date:"2026-03-29",category:"cardio",label:"Cardio 30",who:["fish"]},
      {file:"2026-03-31-grit-cardio-45.JPG",date:"2026-03-31",category:"cardio",label:"Cardio 45",who:["star"]}
    ];

    const gallery = document.getElementById("gallery");
    const stats = document.getElementById("stats");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    let catFilter = "all";
    let whoFilter = "all";
    let sortDesc = true;

    function render() {
      let items = photos;

      // Category filter
      if (catFilter !== "all") {
        items = items.filter(p => p.category === catFilter);
      }

      // Who filter
      if (whoFilter === "fish") {
        items = items.filter(p => p.who.includes("fish"));
      } else if (whoFilter === "star") {
        items = items.filter(p => p.who.includes("star"));
      } else if (whoFilter === "both") {
        items = items.filter(p => p.who.includes("fish") && p.who.includes("star"));
      }

      // Sort by date
      items = [...items].sort((a, b) => {
        return sortDesc
          ? b.date.localeCompare(a.date)
          : a.date.localeCompare(b.date);
      });

      stats.innerHTML = `<span>${items.length}</span> photos`;

      if (items.length === 0) {
        gallery.innerHTML = '<div class="empty">No photos found</div>';
        return;
      }

      gallery.innerHTML = items.map((p, i) => `
        <div class="card" data-category="${p.category}">
          <div class="img-wrap" onclick="openLightbox('fitness/photos/${p.file}')">
            <img src="fitness/photos/${p.file}" alt="${p.label}" loading="${i < 12 ? 'eager' : 'lazy'}">
          </div>
          <div class="info">
            <span class="date">${p.date}</span>
            <span class="title">${p.label}</span>
            <span class="tags">
              ${p.who.includes("star") ? '<span class="who-tag">🌟</span>' : ''}
              ${p.who.includes("fish") ? '<span class="who-tag">🐟</span>' : ''}
              <span class="tag ${p.category}">${p.category === 'athletic' ? 'Athletic/Plyo' : p.category.charAt(0).toUpperCase() + p.category.slice(1)}</span>
            </span>
          </div>
        </div>
      `).join("");
    }

    // Category filter buttons
    document.querySelectorAll("#category-filters button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelector("#category-filters .active").classList.remove("active");
        btn.classList.add("active");
        catFilter = btn.dataset.filter;
        render();
      });
    });

    // Who filter buttons
    document.querySelectorAll("#who-filters button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelector("#who-filters .active").classList.remove("active");
        btn.classList.add("active");
        whoFilter = btn.dataset.who;
        render();
      });
    });

    // Sort button
    document.getElementById("sort-btn").addEventListener("click", () => {
      sortDesc = !sortDesc;
      document.getElementById("sort-arrow").textContent = sortDesc ? "▼" : "▲";
      render();
    });

    // Lightbox
    function openLightbox(src) {
      lightboxImg.src = src;
      lightbox.classList.add("open");
    }
    lightbox.addEventListener("click", () => lightbox.classList.remove("open"));

    render();
  </script>
</body>
</html>
